site_name: HYDRA
site_description: Librería modular de Python para análisis hidrológico y climático
site_url: https://navass11.github.io/HYDRA
repo_url: https://github.com/navass11/HYDRA
repo_name: navass11/HYDRA

theme:
  name: material
  language: es
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: teal
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Instalación: instalacion.md
  - Notebooks:
    - Clima:
      - Corrección de sesgo: notebooks/climate/bias_correction.ipynb
      - Extracción de eventos: notebooks/climate/event_extraction.ipynb
      - Análisis de extremos: notebooks/climate/extreme_value_analysis.ipynb
      - Generación estocástica: notebooks/climate/stochastic_generation.ipynb
      - Campos espaciales: notebooks/climate/spatial_field_generation.ipynb
      - Análisis espacial:
        - Frecuencia regional: notebooks/climate/spatial_analysis/regional_frequency_analysis.ipynb
        - Cópulas: notebooks/climate/spatial_analysis/copulas.ipynb
        - Interpolación: notebooks/climate/spatial_analysis/interpolation.ipynb
        - Bayes jerárquico: notebooks/climate/spatial_analysis/bayes_hierarchical.ipynb
        - Inundación compuesta: notebooks/climate/spatial_analysis/compound_flooding.ipynb
    - Fuentes de datos:
      - Precipitación:
        - Meteostat: notebooks/data_sources/rainfall/Meteostat_download.ipynb
        - AEMET: notebooks/data_sources/rainfall/AEMET_download.ipynb
        - ERA5: notebooks/data_sources/rainfall/ERA5_download.ipynb
        - GPM: notebooks/data_sources/rainfall/GPM_download.ipynb
        - OGIMET: notebooks/data_sources/rainfall/OGIMET_download.ipynb
        - PERSIANN: notebooks/data_sources/rainfall/PERSSIAN_download.ipynb
      - Caudal:
        - GRDC: notebooks/data_sources/river_discharge/GRDC_download.ipynb
        - GloFAS: notebooks/data_sources/river_discharge/GloFAS_download.ipynb
        - USGS: notebooks/data_sources/river_discharge/USGS_download.ipynb
      - Cambio climático:
        - CDS (Copernicus): notebooks/data_sources/climate_change/CDS_download.ipynb
        - ESGF: notebooks/data_sources/climate_change/ESGF_download.ipynb
      - Suelos:
        - SoilGrids: notebooks/data_sources/soils/SoilGrids_download.ipynb
    - Modelización:
      - Hidrología:
        - HEC-HMS: notebooks/modeling/hydrology/HEC_HMS.ipynb
        - SWAT+: notebooks/modeling/hydrology/SWAT.ipynb
      - Hidráulica:
        - HEC-RAS: notebooks/modeling/hydraulic/HEC_RAS.ipynb
        - SFINCS: notebooks/modeling/hydraulic/SFINCS.ipynb
      - Sensibilidad de Manning:
        - Monte Carlo rugosidades: notebooks/modeling/hydraulic/manning_sensitivity/01_monte_carlo_rugosidades.ipynb
        - Análisis SFINCS: notebooks/modeling/hydraulic/manning_sensitivity/02_analisis_sfincs.ipynb
        - Análisis HEC-RAS: notebooks/modeling/hydraulic/manning_sensitivity/03_analisis_hecras.ipynb
        - Comparación modelos: notebooks/modeling/hydraulic/manning_sensitivity/04_comparacion_modelos.ipynb
        - Análisis de regímenes: notebooks/modeling/hydraulic/manning_sensitivity/05_analisis_regimenes.ipynb
        - Figuras paper: notebooks/modeling/hydraulic/manning_sensitivity/06_figuras_paper.ipynb
        - Manning correlado: notebooks/modeling/hydraulic/manning_sensitivity/07_correlated_manning.ipynb
    - Casos piloto:
      - Los Corrales de Buelna:
        - 01 · Adquisición de datos: notebooks/pilot_cases/los_corrales_buelna/01_data_acquisition.ipynb
        - 02 · Interpolación espacial: notebooks/pilot_cases/los_corrales_buelna/02_spatial_interpolation.ipynb
        - 03 · Análisis de extremos: notebooks/pilot_cases/los_corrales_buelna/03_extreme_value_analysis.ipynb
        - 04 · Tormenta de diseño + HEC-HMS: notebooks/pilot_cases/los_corrales_buelna/04_design_storm_hms.ipynb
        - 05 · Simulación continua: notebooks/pilot_cases/los_corrales_buelna/05_continuous_simulation.ipynb
        - 06 · Reconstrucción híbrida: notebooks/pilot_cases/los_corrales_buelna/06_hybrid_event_reconstruction.ipynb
        - 07 · Hidráulica 2D: notebooks/pilot_cases/los_corrales_buelna/07_hec_ras_hydraulics.ipynb
        - 08 · Períodos de retorno: notebooks/pilot_cases/los_corrales_buelna/08_hybrid_return_periods.ipynb
      - Valencia DANA:
        - 01 · Exploración de datos: notebooks/pilot_cases/valencia_dana/01_data_exploration.ipynb
        - 02 · Análisis de extremos: notebooks/pilot_cases/valencia_dana/02_extreme_value_analysis.ipynb
