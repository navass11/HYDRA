# HYDRA Azure Container Apps template.
#
# Replace the placeholders before deploying:
#   <SUBSCRIPTION_ID>, <RESOURCE_GROUP>, <LOCATION>, <ACR_LOGIN_SERVER>,
#   <ACR_USERNAME>, <ACR_PASSWORD>, <MANAGED_ENVIRONMENT_NAME>,
#   <AZURE_FILES_STORAGE_NAME>
#
# The Azure Files shares must be registered in the Container Apps environment
# with the storage names used below. Shared input data is mounted read-only so
# users cannot modify the original datasets from notebooks. User Jupyter
# sessions live on a separate read-write share, and notebook outputs should be
# written inside the session workspace or a dedicated outputs share.
type: Microsoft.App/containerApps
apiVersion: "2024-03-01"
name: hydra-web
location: <LOCATION>
properties:
  managedEnvironmentId: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.App/managedEnvironments/<MANAGED_ENVIRONMENT_NAME>
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      targetPort: 80
      transport: auto
      allowInsecure: false
    registries:
      - server: <ACR_LOGIN_SERVER>
        username: <ACR_USERNAME>
        passwordSecretRef: acr-password
    secrets:
      - name: acr-password
        value: <ACR_PASSWORD>
  template:
    scale:
      minReplicas: 1
      maxReplicas: 1
    containers:
      - name: web
        image: <ACR_LOGIN_SERVER>/hydra-web:latest
        env:
          - name: JUPYTER_UPSTREAM
            value: http://127.0.0.1:8888
          - name: API_UPSTREAM
            value: http://127.0.0.1:8000
        resources:
          cpu: 0.25
          memory: 0.5Gi

      - name: api
        image: <ACR_LOGIN_SERVER>/hydra-api:latest
        env:
          - name: PYTHONPATH
            value: /app
          - name: JUPYTER_INTERNAL_URL
            value: http://127.0.0.1:8888
          - name: HYDRA_JUPYTER_SESSIONS_PATH
            value: ""
        volumeMounts:
          - volumeName: hydra-data
            mountPath: /workspace/data
          - volumeName: hydra-sessions
            mountPath: /workspace/sessions
        resources:
          cpu: 0.5
          memory: 1Gi

      - name: jupyter
        image: <ACR_LOGIN_SERVER>/hydra-jupyter:latest
        env:
          - name: PYTHONPATH
            value: /workspace
          - name: JUPYTER_BASE_URL
            value: /jupyter/
          - name: JUPYTER_TOKEN
            value: ""
          - name: JUPYTER_WORKDIR
            value: /workspace/sessions
          - name: HYDRA_JUPYTER_SESSIONS_PATH
            value: ""
          - name: HYDRA_RUN_GIS_PLOTS
            value: "0"
        volumeMounts:
          - volumeName: hydra-data
            mountPath: /workspace/data
          - volumeName: hydra-sessions
            mountPath: /workspace/sessions
        resources:
          cpu: 1.0
          memory: 2Gi

    volumes:
      - name: hydra-data
        storageType: AzureFile
        storageName: <AZURE_FILES_DATA_READONLY_STORAGE_NAME>
      - name: hydra-sessions
        storageType: AzureFile
        storageName: <AZURE_FILES_SESSIONS_READWRITE_STORAGE_NAME>
