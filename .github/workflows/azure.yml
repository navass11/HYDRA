name: Azure — build & deploy

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'docker/**'
      - 'pyhydra/**'
      - 'web/**'
      - 'notebooks/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY:                          hydratoolsacr.azurecr.io
  RESOURCE_GROUP:                    VisualStudioOnline-3F607BE982BD4B06820771DA8F2FFB4B
  CONTAINER_APP:                     hydra-web
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      # ── Tag = short SHA ──────────────────────────────────────────────────────
      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # ── Log in to ACR with admin credentials ─────────────────────────────────
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── Docker Buildx ─────────────────────────────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      # ── Web image ─────────────────────────────────────────────────────────────
      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/hydra-web:latest
            ${{ env.REGISTRY }}/hydra-web:${{ steps.meta.outputs.tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/hydra-web:latest
          cache-to: type=inline

      # ── API image ─────────────────────────────────────────────────────────────
      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/hydra-api:latest
            ${{ env.REGISTRY }}/hydra-api:${{ steps.meta.outputs.tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/hydra-api:latest
          cache-to: type=inline

      # ── Jupyter image ─────────────────────────────────────────────────────────
      - name: Build and push jupyter
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.jupyter
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/hydra-jupyter:latest
            ${{ env.REGISTRY }}/hydra-jupyter:${{ steps.meta.outputs.tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/hydra-jupyter:latest
          cache-to: type=inline

      # ── Print deploy command ───────────────────────────────────────────────────
      # Azure for Students restricts service principal creation (no OIDC possible).
      # Run this from your local terminal after the workflow finishes:
      - name: Print container app update command
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          echo "============================================================"
          echo "Images pushed. Run locally to deploy to Container Apps:"
          echo ""
          echo "  az containerapp update -n $CONTAINER_APP -g $RESOURCE_GROUP \\"
          echo "    --container-name web    --image $REGISTRY/hydra-web:${TAG}"
          echo "  az containerapp update -n $CONTAINER_APP -g $RESOURCE_GROUP \\"
          echo "    --container-name api    --image $REGISTRY/hydra-api:${TAG}"
          echo "  az containerapp update -n $CONTAINER_APP -g $RESOURCE_GROUP \\"
          echo "    --container-name jupyter --image $REGISTRY/hydra-jupyter:${TAG}"
          echo "============================================================"
