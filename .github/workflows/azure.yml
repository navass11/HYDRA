name: Azure — build & deploy

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'docker/**'
      - 'pyhydra/**'
      - 'web/**'
      - 'notebooks/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC login
  contents: read

env:
  # Single Container App that holds web, api and jupyter as sidecars.
  RESOURCE_GROUP: VisualStudioOnline-3F607BE982BD4B06820771DA8F2FFB4B
  CONTAINER_APP:  hydra-web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Azure login via OIDC (no client secret stored in GitHub) ──────────
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR login server
        id: acr
        run: |
          server=$(az acr show --name ${{ secrets.ACR_NAME }} \
                               --resource-group $RESOURCE_GROUP \
                               --query loginServer -o tsv)
          echo "server=$server" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # ── Docker Buildx (needed for BuildKit cache) ─────────────────────────
      - uses: docker/setup-buildx-action@v3

      # ── Web image (Astro + nginx, amd64) ──────────────────────────────────
      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ steps.acr.outputs.server }}/hydra-web:latest
            ${{ steps.acr.outputs.server }}/hydra-web:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.acr.outputs.server }}/hydra-web:latest
          cache-to: type=inline

      # ── API image (FastAPI + pyhydra) ──────────────────────────────────────
      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.acr.outputs.server }}/hydra-api:latest
            ${{ steps.acr.outputs.server }}/hydra-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.acr.outputs.server }}/hydra-api:latest
          cache-to: type=inline

      # ── Jupyter image (pyhydra full stack, must be linux/amd64) ───────────
      - name: Build and push jupyter
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.jupyter
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.acr.outputs.server }}/hydra-jupyter:latest
            ${{ steps.acr.outputs.server }}/hydra-jupyter:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.acr.outputs.server }}/hydra-jupyter:latest
          cache-to: type=inline

      # ── Deploy all three containers in the single Container App ───────────
      - name: Update web container
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --container-name web \
            --image ${{ steps.acr.outputs.server }}/hydra-web:${{ github.sha }}

      - name: Update api container
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --container-name api \
            --image ${{ steps.acr.outputs.server }}/hydra-api:${{ github.sha }}

      - name: Update jupyter container
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --container-name jupyter \
            --image ${{ steps.acr.outputs.server }}/hydra-jupyter:${{ github.sha }}
