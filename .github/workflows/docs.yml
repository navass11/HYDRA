name: Publicar documentación

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias de documentación
        run: |
          pip install \
            mkdocs-material \
            mkdocs-jupyter \
            numpy pandas scipy matplotlib

      - name: Crear symlink de notebooks en docs
        run: ln -sf ../notebooks docs/notebooks

      - name: Publicar en GitHub Pages
        run: mkdocs gh-deploy --force
