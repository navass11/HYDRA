server {
    listen 80;
    server_name _;

    # Backward compatibility: old direct notebook links are converted into an
    # isolated session copy before reaching Jupyter.
    location ~ ^/jupyter/lab/tree/data/jupyter_sessions/(.*)$ {
        return 302 /jupyter/lab/tree/jupyter_sessions/$1;
    }

    location ~ ^/jupyter/lab/tree/(?!data/jupyter_sessions/)(?!jupyter_sessions/)(.*\.ipynb)$ {
        return 302 /api/notebooks/session?path=$1;
    }

    # JupyterLab — WebSocket + HTTP proxy
    location /jupyter/ {
        proxy_pass         http://jupyter:8888/jupyter/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 300s;
    }

    # Astro static site (landing page)
    location / {
        root       /usr/share/nginx/html;
        try_files  $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "public, max-age=3600";
    }
}
